databases:
  - name: gobike-postgres
    databaseName: gobike
    user: gobike_user
    plan: basic-256mb

services:
  - type: web
    name: gobike-backend
    runtime: node
    plan: starter
    rootDir: server
    buildCommand: npm install
    startCommand: npm start
    healthCheckPath: /health
    autoDeploy: true
    envVars:
      - key: NODE_VERSION
        value: 20
      - key: DATABASE_URL
        fromDatabase:
          name: gobike-postgres
          property: connectionString
      - key: PG_SSL
        value: false
      - key: JWT_SECRET
        generateValue: true
      - key: STRIPE_SECRET_KEY
        sync: false
      - key: RESEND_API_KEY
        sync: false
      - key: EMAIL_FROM
        sync: false
      - key: APP_PUBLIC_BASE_URL
        sync: false
      - key: EMAIL_VERIFICATION_REQUIRED
        value: true
      - key: EMAIL_VERIFICATION_TOKEN_HOURS
        value: 24
      - key: ADMIN_PANEL_SECRET
        sync: false
